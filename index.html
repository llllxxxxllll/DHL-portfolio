        // --- 渐进式图片加载组件 ---
        const ProgressiveImage = ({ src, alt }) => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [hasError, setHasError] = useState(false);

            return (
                <div className="relative w-full overflow-hidden bg-gray-100 min-h-[30vh] md:min-h-[50vh] flex items-center justify-center">
                    {!isLoaded && !hasError && <div className="absolute inset-0 bg-gray-200 animate-pulse"></div>}
                    {hasError && <div className="absolute inset-0 flex items-center justify-center text-gray-400 font-light tracking-widest text-sm uppercase">Image load failed</div>}
                    <img
                        src={src}
                        alt={alt}
                        loading="lazy" 
                        onLoad={() => setIsLoaded(true)}
                        onError={() => setHasError(true)}
                        className={`w-full h-auto object-cover transition-all duration-[1.5s] ease-out will-change-[filter,transform,opacity] ${isLoaded ? "opacity-100 blur-0 scale-100 grayscale" : "opacity-0 blur-xl scale-105"}`}
                    />
                </div>
            );
        };

        // --- 滚动动画组件 ---
        const ScrollReveal = ({ children, delay = 0, className = "" }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);

            return (
                <div ref={ref} className={`transition-all duration-1000 ease-[cubic-bezier(0.16,1,0.3,1)] ${isVisible ? "opacity-100 scale-100 translate-y-0" : "opacity-0 scale-[0.96] translate-y-16"} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

            let isLastProject = false;
            let nextProject = null;

            if (activeProject) {
                currentIndex = allProjectsFlat.findIndex(p => p.id === activeProject.id);
                isLastProject = currentIndex === allProjectsFlat.length - 1;
                nextProject = isLastProject ? null : allProjectsFlat[currentIndex + 1];
            }

            const renderProjectGroup = (group, index) => (

                                        <img src={project.cover} alt={project.title} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105 grayscale" />
                                    </div>
                                    <div className="flex justify-between items-start pr-4">
                                        <div>
                                            <h3 className="text-3xl font-medium tracking-tight mb-4 group-hover:underline decoration-1 underline-offset-8">{project.title}</h3>

                                        </div>
                                    </div>
                                </div>
                            </ScrollReveal>
                        ))}

            );

            return (
                <div className="min-h-screen bg-[#fafafa] text-black font-sans">

                                <div className="max-w-[90rem] mx-auto flex items-center justify-between">
                                    <button onClick={() => setActiveProject(null)} className="group flex items-center gap-3 text-sm font-light uppercase tracking-widest hover:opacity-60 transition-opacity">
                                        <span className="w-8 h-8 rounded-full border border-black/20 flex items-center justify-center group-hover:border-black transition-colors"><ArrowLeftIcon /></span>
                                        返回作品集
                                    </button>
                                </div>
                            </header>
                            <main className="max-w-[90rem] mx-auto pt-24 md:pt-32">
                                <div className="max-w-4xl mx-auto px-6 mb-24 md:mb-32">
                                    <ScrollReveal>
                                        <h1 className="text-4xl md:text-6xl font-thin tracking-tight mb-4 leading-tight">{activeProject.title}</h1>
                                        <p className="text-xl md:text-2xl text-black/40 font-light mb-16 tracking-wide">{activeProject.subtitle}</p>
                                    </ScrollReveal>
                                    <ScrollReveal delay={100}>
                                        <div className="prose prose-lg prose-p:text-black/80 max-w-none">
                                            <p className="text-xl md:text-2xl font-light leading-relaxed mb-20 text-black/70">{activeProject.description}</p>
                                            <div className="grid grid-cols-1 gap-12 md:gap-16 mt-16 border-t border-black/10 pt-16">
                                                {activeProject.sections?.map((section, idx) => (
                                                    <div key={idx} className="grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-12">
                                                        <h3 className="md:col-span-3 text-sm font-light uppercase tracking-[0.2em] text-black/40 m-0 pt-1">{section.title}</h3>
                                                        <div className="md:col-span-9"><p className="whitespace-pre-line text-lg font-light leading-relaxed m-0 text-black/80">{section.content}</p></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </ScrollReveal>
                                </div>
                                <div className="w-full flex flex-col gap-0 md:gap-2 px-0 md:px-6 mb-32">

                                                <div>
                                                    <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em]">Education</p>
                                                    <p className="text-xl font-light tracking-tight">{personalInfo.school} &nbsp; {personalInfo.degree} &nbsp; {personalInfo.major}</p>
                                                </div>
