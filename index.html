<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁贺亮-作品集</title>
    
    <!-- 引入 Tailwind CSS (保持官方 CDN，有较好的全球缓存) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 【优化点1】替换为国内极速 CDN 节点，告别 unpkg 的龟速 -->
    <script src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.staticfile.net/babel-standalone/7.23.1/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .reveal-hidden { opacity: 0; transform: translateY(30px) scale(0.98); }
        .reveal-visible { opacity: 1; transform: translateY(0) scale(1); }

        /* 原生 Loading 动画样式 */
        @keyframes global-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes global-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="selection:bg-black selection:text-white bg-[#fafafa]">
    
    <!-- 【优化点2】在这里预埋了原生的 Loading 界面。
         只要浏览器一打开，它就瞬间显示。等 React 完全加载并编译完接管网页时，它会被自动覆盖消失。没有任何白屏感。 -->
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #fafafa;">
            <div style="width: 32px; height: 32px; border: 2px solid rgba(0,0,0,0.05); border-top-color: rgba(0,0,0,0.8); border-radius: 50%; animation: global-spin 1s linear infinite;"></div>
            <p style="margin-top: 24px; font-size: 10px; letter-spacing: 0.4em; color: rgba(0,0,0,0.3); text-transform: uppercase; animation: global-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">Loading Portfolio</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // --- 1. 数据配置中心 (在这里修改你的链接) ---
        // ==========================================
        
        // 【核心】改为你腾讯云 COS 的基础域名
        const COS_URL = "https://dhl-1420296989.cos.ap-shanghai.myqcloud.com";

        /**
         * 批量生成图片链接（支持无限量加载，默认最高探测100张）
         */
        const generateGallery = (folder, maxCount = 100, ext = "jpg") => {
            return Array.from({ length: maxCount }, (_, i) => `${COS_URL}/projects/${folder}/${i + 1}.${ext}`);
        };

        // --- 个人信息 ---
        const personalInfo = {
            name: "丁贺亮", enName: "HELIANG", lastName: "DING",
            motto: "“平衡体验细节与商业目标，将业务目标拆解为可执行的设计策略。15年深耕，持续深入项目一线。”",
            phone: "156-6990-7825", email: "578458461@qq.com",
            school: "厦门大学", degree: "本科", major: "数字媒体艺术专业",
            avatar: `${COS_URL}/assets/avatar.jpg` 
        };

        // --- 工作履历 ---
        const workExperienceData = [
            { time: "至今 — 2019.09", company: "杭州ACCESS品牌管理集团", role: "UED 负责人", description: "全面负责11人UED团队管理与人才梯度建设，统筹电商C端VTN、B端ABM及海外双平台体验设计。建立跨端设计语言与组件库，设计效能提升约40%。" },
            { time: "2019.07 — 2016.11", company: "杭州金诚集团", role: "设计组负责人", description: "统筹体验与视觉设计两大专业方向。全面负责“金诚逸APP”整体体验，主导多个从0到1的创新项目。" },
            { time: "2016.06 — 2014.11", company: "墨仕(厦门)电子商务有限公司", role: "体验设计师", description: "独立负责“敢约”、“友空”等多款社交产品从概念到上线的完整体验设计。主导输出产品设计策略。" },
            { time: "2014.10 — 2011.07", company: "厦门悟都软件技术有限公司", role: "视觉设计师", description: "服务华为、联想、OPPO等一线手机厂商，主导移动操作系统定制化UI及动效视觉设计。" }
        ];

        // --- 核心项目作品 (不限数量自动探测版) ---
        const corePortfolioData = [
            {
                groupId: "group-1", groupTitle: "品牌设计体系建设",
                projects: [
                    { id: 1, title: "VTN 品牌升级", subtitle: "App品牌重塑及核心体验优化", cover: `${COS_URL}/projects/vtn-brand/cover.jpg`, gallery: generateGallery("vtn-brand") },
                    { id: 2, title: "海外设计体系建设", subtitle: "东南亚市场0-1建设，NTX、NTXBiz", cover: `${COS_URL}/projects/overseas/cover.jpg`, gallery: generateGallery("overseas") }
                ]
            },
            {
                groupId: "group-2", groupTitle: "AI赋能",
                projects: [
                    { id: 3, title: "ABM AI获客中心", subtitle: "AI赋能B端营销中台", cover: `${COS_URL}/projects/abm-ai/cover.jpg`, gallery: generateGallery("abm-ai") },
                    { id: 4, title: "VTN AI营养师", subtitle: "AI健康智能体", cover: `${COS_URL}/projects/vtn-ai/cover.jpg`, gallery: generateGallery("vtn-ai") }
                ]
            },
            {
                groupId: "group-3", groupTitle: "C端频道差异化建设",
                projects: [
                    { id: 5, title: "福利甄选", subtitle: "常态化闪购体验设计", cover: `${COS_URL}/projects/vtn-selection/cover.jpg`, gallery: generateGallery("vtn-selection") },
                    { id: 6, title: "自研直播", subtitle: "沉浸式电商直播购物及互动体验", cover: `${COS_URL}/projects/vtn-live/cover.jpg`, gallery: generateGallery("vtn-live") }
                ]
            },
            {
                groupId: "group-4", groupTitle: "B端生态赋能",
                projects: [
                    { id: 7, title: "ABM体验建设", subtitle: "B端个体经销商全链路数字化工作台", cover: `${COS_URL}/projects/abm-b2b/cover.jpg`, gallery: generateGallery("abm-b2b") }
                ]
            },
            {
                groupId: "group-5", groupTitle: "其他（含动效）",
                projects: [
                    { 
                        id: 8, 
                        title: "社交、育儿、视频、生活服务等", 
                        subtitle: "需跳转第三方", 
                        cover: `${COS_URL}/projects/others/cover.jpg`, 
                        externalLink: "https://www.zcool.com.cn/work/ZMzcyMzU2MDg=.html" 
                    }
                ]
            }
        ];

        const managementData = [
            {
                groupId: "group-6", projects: [
                    { id: 9, title: "UED 团队管理与体系建设", subtitle: "流程提效与组织发展", cover: `${COS_URL}/projects/management/cover.jpg`, gallery: generateGallery("management") }
                ]
            }
        ];

        // --- 2. 交互与功能组件 ---

        const ArrowLeftIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
        const MailIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const PhoneIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>);
        const ArrowUpRightIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>);
        const CopyIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);

        const ProgressiveImage = ({ src, alt, className = "", onLoadSuccess }) => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [isError, setIsError] = useState(false);

            if (isError) return null;

            return (
                <div className={`relative w-full overflow-hidden flex items-center justify-center ${className} ${!isLoaded ? 'bg-[#f2f4f6] min-h-[30vh] md:min-h-[50vh]' : ''}`}>
                    {!isLoaded && (
                        <div className="absolute inset-0 bg-[#f2f4f6] flex items-center justify-center">
                            <svg className="w-6 h-6 md:w-8 md:h-8 text-black/10 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    )}
                    <img 
                        src={src} 
                        alt={alt} 
                        loading="lazy" 
                        onLoad={() => {
                            setIsLoaded(true);
                            if (onLoadSuccess) onLoadSuccess();
                        }} 
                        onError={() => setIsError(true)} 
                        className={`w-full h-auto object-cover transition-all duration-[1.2s] ease-out ${isLoaded ? "opacity-100 blur-0" : "opacity-0 blur-lg"}`} 
                    />
                </div>
            );
        };

        const ProjectGallery = ({ gallery }) => {
            const [highestValid, setHighestValid] = useState(-1);
            const renderCount = highestValid + 4; 

            return (
                <div className="flex flex-col gap-4 md:gap-8 px-4 md:px-6 mb-16 mt-4 md:mt-0">
                    {gallery?.slice(0, renderCount).map((src, idx) => (
                        <ProgressiveImage 
                            key={src} 
                            src={src} 
                            alt={`Detail ${idx + 1}`} 
                            onLoadSuccess={() => {
                                setHighestValid(prev => Math.max(prev, idx));
                            }}
                        />
                    ))}
                </div>
            );
        };

        const ScrollReveal = ({ children, delay = 0, className = "" }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const checkStatus = () => {
                    if (ref.current) {
                        const rect = ref.current.getBoundingClientRect();
                        if (rect.top < (window.innerHeight || document.documentElement.clientHeight) && rect.bottom > 0) { setIsVisible(true); return true; }
                    }
                    return false;
                };
                const timer = setTimeout(checkStatus, 60);
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
                }, { threshold: 0.05 });
                if (ref.current) observer.observe(ref.current);
                return () => { clearTimeout(timer); if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return ( <div ref={ref} className={`transition-all duration-1000 ease-[cubic-bezier(0.16,1,0.3,1)] ${isVisible ? "reveal-visible" : "reveal-hidden"} ${className}`} style={{ transitionDelay: `${delay}ms` }}> {children} </div> );
        };

        function App() {
            const [activeProject, setActiveProject] = useState(null);
            const [activeSection, setActiveSection] = useState('bio');
            const [toast, setToast] = useState("");
            const scrollPosRef = useRef(0);

            useEffect(() => {
                if (activeProject) return;
                const handler = () => {
                    const sections = ['bio', 'experience', 'projects'];
                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= 160 && rect.bottom >= 160) { setActiveSection(id); break; }
                        }
                    }
                };
                window.addEventListener('scroll', handler);
                return () => window.removeEventListener('scroll', handler);
            }, [activeProject]);

            const scrollToSection = (id) => {
                setActiveSection(id);
                const el = document.getElementById(id);
                if (id === 'bio') { window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else if (el) { window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }
            };

            const handleCopy = (txt) => {
                const textArea = document.createElement("textarea");
                textArea.value = txt;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setToast("复制成功");
                } catch (err) {
                    setToast("复制失败");
                }
                document.body.removeChild(textArea);
                setTimeout(() => setToast(""), 2000);
            };

            const allProjects = [...corePortfolioData.flatMap(g => g.projects), ...managementData.flatMap(g => g.projects)];
            let prevProject = null;
            let nextProject = null;
            if (activeProject) {
                const curIdx = allProjects.findIndex(p => p.id === activeProject.id);
                prevProject = curIdx > 0 ? allProjects[curIdx - 1] : null;
                nextProject = allProjects[curIdx + 1] || null;
            }

            const renderProjectGroup = (group) => (
                <section key={group.groupId}>
                    {group.groupTitle && (
                        <ScrollReveal><div className="mb-6 md:mb-12 pl-2"><h2 className="text-2xl md:text-4xl font-bold tracking-tight">{group.groupTitle}</h2></div></ScrollReveal>
                    )}
                    <div className="grid grid-cols-2 gap-4 md:gap-24 mb-8 md:mb-32">
                        {group.projects.map((p, i) => (
                            <ScrollReveal key={p.id} delay={i * 100}>
                                <div className="group cursor-pointer p-0 md:p-6 m-0 md:-m-6 transition-all duration-700 md:hover:-translate-y-3 md:hover:shadow-[0_50px_100px_rgba(0,0,0,0.06)] bg-transparent md:hover:bg-white border border-transparent md:hover:border-black/5 md:hover:z-10 relative" 
                                     onClick={() => { 
                                         if (p.externalLink) {
                                             window.open(p.externalLink, '_blank');
                                             return;
                                         }
                                         scrollPosRef.current = window.scrollY; 
                                         setActiveProject(p); 
                                         window.scrollTo(0,0); 
                                     }}>
                                    
                                    <div className="aspect-video overflow-hidden bg-[#ededed] mb-3 md:mb-5 shadow-sm relative">
                                        <ProgressiveImage src={p.cover} alt={p.title} className="w-full h-full md:group-hover:scale-105 transition-transform duration-1000" />
                                    </div>
                                    
                                    <div className="flex justify-between items-start pr-0 md:pr-4">
                                        <div>
                                            <h3 className="text-base md:text-xl font-normal tracking-tight mb-1 md:mb-3 md:group-hover:underline underline-offset-4 md:underline-offset-8 decoration-1">{p.title}</h3>
                                            <p className="text-[10px] md:text-sm text-black/50 font-light tracking-wider md:tracking-widest uppercase line-clamp-2 md:line-clamp-none leading-tight md:leading-normal">{p.subtitle}</p>
                                        </div>
                                        <div className="w-12 h-12 rounded-full border border-black/20 hidden md:flex items-center justify-center opacity-0 -translate-x-6 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-500 bg-black text-white mt-1">
                                            <ArrowUpRightIcon />
                                        </div>
                                    </div>
                                </div>
                            </ScrollReveal>
                        ))}
                    </div>
                </section>
            );

            // --- 详情页视图 ---
            if (activeProject) {
                return (
                    <div className="bg-[#ffffff] min-h-screen fade-in">
                        <header className="sticky top-0 z-50 bg-[#ffffff]/90 backdrop-blur-md py-6 px-6 md:px-12 border-b border-black/[0.05]">
                            <div className="max-w-[90rem] mx-auto flex items-center justify-between">
                                <button onClick={() => { setActiveProject(null); setTimeout(() => window.scrollTo({top: scrollPosRef.current, behavior: 'instant'}), 50); }} 
                                        className="group flex items-center gap-3 text-sm font-light uppercase tracking-widest hover:opacity-60 transition-opacity">
                                    <span className="w-8 h-8 rounded-full border border-black/20 flex items-center justify-center group-hover:border-black transition-colors"><ArrowLeftIcon size={16} /></span> 返回作品集
                                </button>
                            </div>
                        </header>
                        
                        <main className="max-w-[90rem] mx-auto pt-0 md:pt-20 bg-[#ffffff]">
                            <ProjectGallery gallery={activeProject.gallery} />

                            <div className="pt-12 pb-24 md:pb-40 flex flex-row justify-center items-stretch gap-2 md:gap-6 px-4 md:px-6 max-w-5xl mx-auto">
                                {prevProject && (
                                    <button onClick={() => { 
                                                if (prevProject.externalLink) {
                                                    window.open(prevProject.externalLink, '_blank');
                                                    return;
                                                }
                                                setActiveProject(prevProject); window.scrollTo(0,0); 
                                            }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-10 md:py-20 transition-all duration-700 bg-transparent rounded-none text-center w-full">
                                        <span className="text-black/30 text-[10px] md:text-sm tracking-[0.2em] md:tracking-[0.5em] uppercase font-light">上一个作品</span>
                                        <div className={`${prevProject.title.length > 10 ? 'text-xs md:text-3xl' : prevProject.title.length > 6 ? 'text-sm md:text-4xl' : 'text-base md:text-5xl'} font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-[8px] md:underline-offset-[20px] decoration-1 flex items-center justify-center gap-1 md:gap-3 flex-wrap break-keep`}>
                                            {prevProject.title}
                                            {prevProject.externalLink && <span className="opacity-30"><ArrowUpRightIcon /></span>}
                                        </div>
                                    </button>
                                )}
                                
                                {nextProject ? (
                                    <button onClick={() => { 
                                                if (nextProject.externalLink) {
                                                    window.open(nextProject.externalLink, '_blank');
                                                    return;
                                                }
                                                setActiveProject(nextProject); window.scrollTo(0,0); 
                                            }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-10 md:py-20 transition-all duration-700 bg-transparent rounded-none text-center w-full">
                                        <span className="text-black/30 text-[10px] md:text-sm tracking-[0.2em] md:tracking-[0.5em] uppercase font-light">下一个作品</span>
                                        <div className={`${nextProject.title.length > 10 ? 'text-xs md:text-3xl' : nextProject.title.length > 6 ? 'text-sm md:text-4xl' : 'text-base md:text-5xl'} font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-[8px] md:underline-offset-[20px] decoration-1 flex items-center justify-center gap-1 md:gap-3 flex-wrap break-keep`}>
                                            {nextProject.title}
                                            {nextProject.externalLink && <span className="opacity-30"><ArrowUpRightIcon /></span>}
                                        </div>
                                    </button>
                                ) : (
                                    <button onClick={() => { setActiveProject(null); setTimeout(() => window.scrollTo({top: scrollPosRef.current, behavior: 'instant'}), 50); }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-10 md:py-20 transition-all duration-700 bg-transparent rounded-none text-center w-full">
                                        <span className="text-black/30 text-[10px] md:text-sm tracking-[0.2em] md:tracking-[0.5em] uppercase font-light">End</span>
                                        <div className="text-base md:text-5xl font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-[8px] md:underline-offset-[20px] decoration-1 uppercase">
                                            返回作品列表
                                        </div>
                                    </button>
                                )}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- 首页视图 ---
            return (
                <div className="min-h-screen bg-[#fafafa] text-black">
                    {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 rounded-full text-sm z-[1000] fade-in shadow-2xl">{toast}</div>}
                    
                    <nav className="fixed top-0 left-0 w-full z-[100] bg-[#fafafa]/90 backdrop-blur-md py-5 border-b border-black/[0.05]">
                        <div className="max-w-[90rem] mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="font-bold tracking-[0.2em] text-sm uppercase hidden md:block">DING HELIANG</div>
                            <div className="flex gap-8 text-xs md:text-sm tracking-widest mx-auto md:mx-0">
                                <button onClick={() => scrollToSection('bio')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'bio' ? 'text-black' : 'text-black/30 hover:text-black'}`}>个人简介</button>
                                <button onClick={() => scrollToSection('experience')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'experience' ? 'text-black' : 'text-black/30 hover:text-black'}`}>工作履历</button>
                                <button onClick={() => scrollToSection('projects')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'projects' ? 'text-black' : 'text-black/30 hover:text-black'}`}>核心项目作品</button>
                            </div>
                        </div>
                    </nav>

                    <header id="bio" className="relative min-h-screen flex flex-col justify-center pt-32 pb-8 md:pb-16">
                        <div className="absolute top-0 left-0 w-full flex justify-center pt-24 md:pt-32 overflow-hidden select-none pointer-events-none z-0">
                            <span className="text-[22vw] lg:text-[23vw] font-black text-black/[0.03] tracking-tighter leading-[0.8] whitespace-nowrap uppercase">PORTFOLIO</span>
                        </div>
                        <div className="max-w-[90rem] mx-auto w-full px-6 md:px-12 grid lg:grid-cols-12 gap-12 items-center z-10 relative mt-12 md:mt-20">
                            <div className="lg:col-span-7 flex flex-col justify-center relative z-20 order-2 lg:order-1">
                                <ScrollReveal>
                                    <h1 className="leading-[0.85] uppercase m-0 p-0 text-black flex flex-col tracking-tighter">
                                        <span className="font-light tracking-[0.3em] text-black/30 text-xs md:text-sm mb-8 ml-1">SELECTED WORKS</span>
                                        <span className="font-black text-[22vw] lg:text-[13vw] ml-[-1vw]">{personalInfo.lastName}</span>
                                        <span className="font-thin italic text-[16vw] lg:text-[9.5vw] mt-2">{personalInfo.enName}</span>
                                        <span className="font-medium not-italic text-4xl md:text-6xl tracking-[0.2em] text-black mt-6 lg:mt-10 opacity-80 ml-1">{personalInfo.name}</span>
                                    </h1>
                                </ScrollReveal>
                                <ScrollReveal delay={200} className="mt-20 lg:mt-24 max-w-xl pl-1">
                                    <p className="text-black/30 mb-5 text-xs font-light uppercase tracking-[0.2em]">Design Philosophy</p>
                                    <p className="font-light text-xl md:text-2xl leading-relaxed text-black/80 tracking-wide">{personalInfo.motto}</p>
                                    <div className="flex flex-col gap-y-10 mt-16 pt-10 border-t border-black/[0.05]">
                                        <div>
                                            <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em]">Education</p>
                                            <p className="text-xl font-light tracking-tight">
                                                {personalInfo.school}
                                                <span className="font-thin mx-2 opacity-20">/</span>
                                                {personalInfo.degree}
                                                <span className="font-thin mx-2 opacity-20">/</span>
                                                {personalInfo.major}
                                            </p>
                                        </div>
                                        <div className="flex flex-wrap gap-x-16 gap-y-6">
                                            <div onClick={() => handleCopy(personalInfo.phone.replace(/-/g, ''))} className="cursor-pointer group">
                                                <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em] group-hover:text-black transition-colors">Phone <span className="normal-case tracking-normal opacity-70 ml-1 font-thin">(Wechat)</span></p>
                                                <div className="flex items-center gap-3">
                                                    <p className="text-xl font-light tracking-tight">{personalInfo.phone}</p>
                                                    <span className="text-black/30 group-hover:text-black transition-colors"><CopyIcon/></span>
                                                </div>
                                            </div>
                                            <div onClick={() => handleCopy(personalInfo.email)} className="cursor-pointer group">
                                                <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em] group-hover:text-black transition-colors">Email</p>
                                                <div className="flex items-center gap-3">
                                                    <p className="text-xl font-light tracking-tight lowercase">{personalInfo.email}</p>
                                                    <span className="text-black/30 group-hover:text-black transition-colors"><CopyIcon/></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </ScrollReveal>
                            </div>
                            <div className="lg:col-span-5 relative order-1 lg:order-2 flex justify-end">
                                <ScrollReveal delay={400} className="w-full max-w-[380px] lg:max-w-[420px] aspect-[3/4] overflow-hidden bg-[#ededed] shadow-2xl">
                                    <img src={personalInfo.avatar} className="w-full h-full object-cover opacity-90 transition-transform duration-[2s] hover:scale-105" />
                                </ScrollReveal>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[90rem] mx-auto px-6 md:px-12 py-12 md:py-20">
                        <section id="experience" className="mb-10 md:mb-32 pt-8 md:pt-12 border-t border-black/[0.05]">
                            <ScrollReveal><div className="mb-16 pl-1">
                                <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4">工作履历</h2>
                                <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Professional Experience</p>
                            </div></ScrollReveal>
                            <div className="hidden md:block w-full relative pb-12 pt-8">
                                <div className="w-full relative flex py-32 md:py-40 px-0">
                                    <div className="absolute left-0 w-full h-[1px] bg-black/10 top-1/2 -translate-y-1/2"></div>
                                    <div className="grid grid-cols-4 w-full">
                                        {workExperienceData.map((exp, idx) => (
                                            <ScrollReveal key={idx} delay={idx * 150} className="relative flex justify-center group cursor-default">
                                                <div className="absolute w-[11px] h-[11px] bg-[#fafafa] border border-black/20 rounded-full top-1/2 -translate-y-1/2 group-hover:bg-black group-hover:scale-[1.5] transition-all z-20"></div>
                                                <div className={`absolute w-[1px] bg-black/15 ${idx%2===0 ? 'bottom-1/2 mb-2 h-8' : 'top-1/2 mt-2 h-8'} group-hover:bg-black/40 transition-all z-10`}></div>
                                                <div className={`absolute left-1/2 -translate-x-1/2 ${idx%2===0 ? 'top-1/2 mt-8' : 'bottom-1/2 mb-8'}`}><p className="text-xs font-light tracking-[0.1em] text-black/50 uppercase whitespace-nowrap">{exp.time}</p></div>
                                                <div className={`absolute w-[90%] left-1/2 -translate-x-1/2 ${idx%2===0 ? 'bottom-1/2 mb-16' : 'top-1/2 mt-16'}`}>
                                                    <div className="flex flex-col"><h3 className="text-lg xl:text-xl font-bold tracking-tight mb-1">{exp.company}</h3><p className="text-sm font-medium text-black/50 mb-3">{exp.role}</p><p className="text-[12px] font-light leading-relaxed text-black/60">{exp.description}</p></div>
                                                </div>
                                            </ScrollReveal>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="block md:hidden border-l border-black/20 ml-2 mt-8">
                                {workExperienceData.map((exp, idx) => (
                                    <ScrollReveal key={idx} delay={idx * 100} className="relative pl-6 mb-12 group cursor-default">
                                        <div className="absolute w-[11px] h-[11px] bg-[#fafafa] border border-black/20 rounded-full -left-[6px] top-1 group-hover:bg-black transition-all z-10"></div>
                                        <p className="text-[11px] font-light tracking-[0.1em] text-black/50 uppercase mb-2">{exp.time}</p>
                                        <h3 className="text-lg font-bold tracking-tight mb-1">{exp.company}</h3>
                                        <p className="text-xs font-medium text-black/50 mb-3">{exp.role}</p>
                                        <p className="text-[12px] font-light leading-relaxed text-black/60">{exp.description}</p>
                                    </ScrollReveal>
                                ))}
                            </div>
                        </section>

                        <div id="projects" className="pt-8 border-t border-black/[0.05]">
                            <ScrollReveal><div className="mb-12 pl-1 pt-8">
                                <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4 uppercase">核心项目作品</h2>
                                <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Selected Core Projects</p>
                            </div></ScrollReveal>
                            <div className="mb-8 md:mb-32">{corePortfolioData.map(renderProjectGroup)}</div>

                            <div className="pt-8 md:pt-12 border-t border-black/[0.05]">
                                <ScrollReveal><div className="mb-8 md:mb-12 pl-1 pt-8">
                                    <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4 uppercase">团队管理</h2>
                                    <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Team Management & Leadership</p>
                                </div></ScrollReveal>
                                <div className="mb-4 md:mb-0">{managementData.map(renderProjectGroup)}</div>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-black text-white py-12 md:py-24 mt-8 md:mt-16 border-t border-white/5">
                        <div className="max-w-[90rem] mx-auto px-6 md:px-12 flex flex-col lg:flex-row justify-between items-start gap-16">
                            <ScrollReveal>
                                <h2 className="text-6xl md:text-8xl tracking-tighter mb-16 leading-[0.9]">
                                    <span className="font-thin">LET'S CREATE</span><br/><span className="font-black text-white/40">SOMETHING</span><br/><span className="font-thin">TOGETHER.</span>
                                </h2>
                                <div className="flex flex-wrap gap-10">
                                    <div className="flex items-center gap-4 text-sm md:text-base font-light tracking-widest hover:text-white/60 transition-colors cursor-pointer" onClick={() => handleCopy(personalInfo.email)}>
                                        <span className="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center"><MailIcon /></span>{personalInfo.email}
                                    </div>
                                    <div className="flex items-center gap-4 text-sm md:text-base font-light tracking-widest hover:text-white/60 transition-colors cursor-pointer" onClick={() => handleCopy(personalInfo.phone.replace(/-/g, ''))}>
                                        <span className="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center"><PhoneIcon /></span>
                                        <span>{personalInfo.phone} <span className="text-white/40 text-xs md:text-sm ml-1 font-thin">(Wechat)</span></span>
                                    </div>
                                </div>
                            </ScrollReveal>
                            <div className="flex flex-col lg:items-end text-white/40 text-sm font-light uppercase tracking-[0.2em] mt-12">
                                <p>Based in China</p><p className="mt-12 text-xs opacity-30 font-sans tracking-normal">© {new Date().getFullYear()} Heliang Ding.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
