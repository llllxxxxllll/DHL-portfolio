<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁贺亮-作品集</title>
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; scroll-behavior: smooth; background-color: #fafafa; }
        
        /* 核心动画 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .reveal-hidden { opacity: 0; transform: translateY(30px) scale(0.98); }
        .reveal-visible { opacity: 1; transform: translateY(0) scale(1); }
    </style>
</head>
<body class="selection:bg-black selection:text-white">

    <!-- 加载界面：14px 稳重感 -->
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #fafafa;">
            <div style="width: 32px; height: 32px; border: 2px solid rgba(0,0,0,0.05); border-top-color: rgba(0,0,0,0.8); border-radius: 50%; animation: global-spin 1s linear infinite;"></div>
            <p style="margin-top: 24px; font-size: 14px; color: rgba(0,0,0,0.8); text-transform: uppercase; font-weight: 400; letter-spacing: normal;">正在为您对齐最后一颗像素</p>
            <style>@keyframes global-spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <!-- 稳定版核心依赖 -->
    <script src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.net/babel-standalone/7.23.1/babel.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // --- 1. 数据配置 (严格锁死路径，减少抓取数量防止卡顿) ---
        // ==========================================
        const COS_URL = "https://dhl-1420296989.cos.ap-shanghai.myqcloud.com";

        const generateGallery = (folder, maxCount = 6) => {
            return Array.from({ length: maxCount }, (_, i) => `${COS_URL}/projects/${folder}/${i + 1}.jpg`);
        };

        const personalInfo = {
            name: "丁贺亮", enName: "HELIANG", lastName: "DING",
            motto: "“伟大的体验往往隐于无形。我主张‘极简的交互逻辑’与‘极细腻的情感触点’并存。多年的项目一线的沉淀，让我学会在错综复杂的业务中通过设计建立秩序，化繁为简，让商业意图自然发生”",
            phone: "156-6990-7825", email: "578458461@qq.com",
            school: "厦门大学", degree: "本科", major: "数字媒体艺术专业",
            avatar: `${COS_URL}/assets/avatar.jpg` 
        };

        const workExperienceData = [
            { time: "今 — 2019.09", company: "杭州ACCESS品牌管理集团", role: "UED 负责人", description: "1.全面负责UED团队人才阶梯建设、专业赋能、绩效考核与文化塑造，制定设计战略并与公司业务目标对齐；\n2.统筹核心产品（VTN、ABM、TJ）及海外新业务NTX体系从0到1的体验设计规划与落地、构建5大设计体系；\n3.深入设计一线，担任重点难点项目核心主设，确保高质量交付；\n4.建立设计内审机制，优化设计流程及跨部门协作机制。" },
            { time: "2019.07 — 2016.11", company: "杭州金诚集团", role: "设计组负责人", description: "1.负责体验与视觉设计团队建设与文化塑造；\n2.担任核心项目主设，主导金诚逸IM、有象视频、区块链应用及育儿产品等多条业务线全链路体验设计；\n3.制定设计流程、评审规范与质量标尺，系统化提升团队输出效率；\n4.建立常态化沟通机制，确保设计方案高质量交付。" },
            { time: "2016.06 — 2014.11", company: "厦门墨仕电子商务有限公司", role: "体验设计师", description: "1.独立负责“敢约”、“友空”等多款社交产品从概念到上线的全链路交付，定义信息架构与视觉风格；\n2.主导输出产品的核心设计策略与设计语言；\n3.为产品线建立并维护初期设计系统与组件库，显著提升协作效率。" },
            { time: "2014.10 — 2011.07", company: "厦门悟都软件技术有限公司", role: "视觉设计师", description: "1.服务于华为、联想等厂商，深度参与操作系统定制化设计，独立承担从概念到落地的视觉方案；\n2.专精系统级动态视觉表达（如开机动画）及原生应用UI设计；\n3.精准实施各品牌独有的设计规范，实现“零误差”交付。" }
        ];

        const corePortfolioData = [
            {
                groupId: "group-3", groupTitle: "频道差异化建设",
                projects: [
                    { id: 5, title: "福利甄选", subtitle: "常态化闪购体验设计", cover: `${COS_URL}/projects/vtn-selection/cover.jpg`, gallery: generateGallery("vtn-selection") },
                    { id: 6, title: "自研直播", subtitle: "沉浸式电商直播购物及互动体验", cover: `${COS_URL}/projects/vtn-live/cover.jpg`, gallery: generateGallery("vtn-live") }
                ]
            },
            {
                groupId: "group-4", groupTitle: "B端生态赋能",
                projects: [
                    { id: 7, title: "ABM体验建设", subtitle: "B端个体经销商全链路数字化工作台", cover: `${COS_URL}/projects/abm-b2b/cover.jpg`, gallery: generateGallery("abm-b2b") }
                ]
            },
            {
                groupId: "group-5", groupTitle: "其他",
                projects: [
                    { id: 8, title: "社交、育儿、视频等（含动效）", subtitle: "点击跳转第三方", cover: `${COS_URL}/projects/others/cover.jpg`, externalLink: "https://www.zcool.com.cn/work/ZMzcyMzU2MDg=.html" }
                ]
            }
        ];

        const managementData = [
            {
                groupId: "group-6", projects: [
                    { id: 9, title: "UED 团队管理与体系建设", subtitle: "人才与文化建设、体系构建、价值量化", cover: `${COS_URL}/projects/management/cover.jpg`, gallery: generateGallery("management") }
                ]
            }
        ];

        // --- 2. 交互组件 ---
        const ArrowLeftIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
        const MailIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const PhoneIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>);
        const ArrowUpRightIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>);
        const CopyIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);

        const ProgressiveImage = ({ src, alt, className = "" }) => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [isError, setIsError] = useState(false);
            if (isError) return null;
            return (
                <div className={`relative w-full overflow-hidden flex items-center justify-center ${className} ${!isLoaded ? 'bg-[#f2f4f6] min-h-[30vh] md:min-h-[50vh]' : ''}`}>
                    {!isLoaded && (
                        <div className="absolute inset-0 bg-[#f2f4f6] flex items-center justify-center">
                            <svg className="w-6 h-6 md:w-8 md:h-8 text-black/10 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    )}
                    <img src={src} alt={alt} loading="lazy" onLoad={() => setIsLoaded(true)} onError={() => setIsError(true)} className={`w-full h-auto object-cover transition-all duration-[1.2s] ease-out ${isLoaded ? "opacity-100 blur-0" : "opacity-0 blur-lg"}`} />
                </div>
            );
        };

        const ScrollReveal = ({ children, delay = 0, className = "" }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
                }, { threshold: 0.05 });
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return ( <div ref={ref} className={`transition-all duration-1000 ease-[cubic-bezier(0.16,1,0.3,1)] ${isVisible ? "reveal-visible" : "reveal-hidden"} ${className}`} style={{ transitionDelay: `${delay}ms` }}> {children} </div> );
        };

        // --- 3. 主应用 ---
        function App() {
            const [activeProject, setActiveProject] = useState(null);
            const [activeSection, setActiveSection] = useState('bio');
            const [toast, setToast] = useState("");
            const scrollPosRef = useRef(0);

            const allProjects = useMemo(() => [...corePortfolioData.flatMap(g => g.projects), ...managementData.flatMap(g => g.projects)], []);
            
            // 恢复“上一个作品”和“下一个作品”导航
            const prevProject = useMemo(() => {
                if (!activeProject) return null;
                const idx = allProjects.findIndex(p => p.id === activeProject.id);
                return idx > 0 ? allProjects[idx - 1] : null;
            }, [activeProject, allProjects]);

            const nextProject = useMemo(() => {
                if (!activeProject) return null;
                const idx = allProjects.findIndex(p => p.id === activeProject.id);
                return allProjects[idx + 1] || null;
            }, [activeProject, allProjects]);

            useEffect(() => {
                if (activeProject) return;
                const handler = () => {
                    const sections = ['bio', 'experience', 'projects'];
                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= 160 && rect.bottom >= 160) { setActiveSection(id); break; }
                        }
                    }
                };
                window.addEventListener('scroll', handler, { passive: true });
                return () => window.removeEventListener('scroll', handler);
            }, [activeProject]);

            const scrollToSection = (id) => {
                setActiveSection(id);
                const el = document.getElementById(id);
                if (id === 'bio') { window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else if (el) { window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }
            };

            const handleCopy = (txt) => {
                const textArea = document.createElement("textarea");
                textArea.value = txt;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); setToast("复制成功"); } catch (err) { setToast("复制失败"); }
                document.body.removeChild(textArea);
                setTimeout(() => setToast(""), 2000);
            };

            const renderProjectGroup = (group) => (
                <section key={group.groupId} className="mb-24">
                    {group.groupTitle && (
                        <ScrollReveal className="relative z-20">
                            {/* 3. 优化：手机端标题到项目列表的间距减少到二分之一 (mb-[72px] -> mb-9) */}
                            <div className="mb-9 md:mb-8 pl-1">
                                <h2 className="text-3xl md:text-5xl font-thin text-black/30">{group.groupTitle}</h2>
                            </div>
                        </ScrollReveal>
                    )}
                    {/* 4. 优化：手机端项目之间的间距缩小到二分之一 (gap-16 -> gap-8)，PC 端保持 gap-24 不变 */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-24">
                        {group.projects.map((p, i) => (
                            <ScrollReveal key={p.id} delay={i * 100}>
                                <div className="group cursor-pointer p-0 md:p-8 m-0 md:-m-8 transition-all duration-700 md:hover:-translate-y-3 md:hover:shadow-[0_50px_100px_rgba(0,0,0,0.06)] bg-transparent md:hover:bg-white border border-transparent md:hover:border-black/5 md:hover:z-10 relative" 
                                     onClick={() => { 
                                         if (p.externalLink) {
                                             window.open(p.externalLink, '_blank');
                                         } else {
                                             scrollPosRef.current = window.scrollY; 
                                             setActiveProject(p); 
                                             window.scrollTo(0,0); 
                                         }
                                     }}>
                                    <div className="aspect-video overflow-hidden bg-[#ededed] mb-3 md:mb-4 relative">
                                        <ProgressiveImage src={p.cover} alt={p.title} className="w-full h-full md:group-hover:scale-105 transition-transform duration-1000" />
                                    </div>
                                    <div className="flex justify-between items-center pr-0 md:pr-4">
                                        <div className="flex-1 pr-4">
                                            <h3 className="text-lg md:text-xl font-normal tracking-tight mb-1 md:mb-2 md:group-hover:underline underline-offset-8 decoration-1">{p.title}</h3>
                                            {/* 5. 优化：手机端副文案字号 +1 (text-xs -> text-[13px])，PC 端保持 md:text-sm 不变 */}
                                            <p className="text-[13px] md:text-sm text-black/40 font-light tracking-widest uppercase leading-normal">{p.subtitle}</p>
                                        </div>
                                        {/* 手机端专门加入的向右箭头，增加点击感并与封面右对齐 */}
                                        <div className="md:hidden flex items-center justify-center text-black/20">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                        </div>
                                        {/* PC端的原交互圆圈 */}
                                        <div className="w-12 h-12 rounded-full border border-black/20 hidden md:flex items-center justify-center opacity-0 -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-500 bg-black text-white mt-1">
                                            <ArrowUpRightIcon size={20} />
                                        </div>
                                    </div>
                                </div>
                            </ScrollReveal>
                        ))}
                    </div>
                </section>
            );

            // --- 详情页 ---
            if (activeProject) {
                return (
                    <div className="bg-[#ffffff] min-h-screen fade-in">
                        <header className="sticky top-0 z-50 bg-[#ffffff]/90 backdrop-blur-md py-6 px-6 md:px-12 border-b border-black/[0.05]">
                            <div className="max-w-[90rem] mx-auto flex items-center justify-between">
                                <button onClick={() => { setActiveProject(null); setTimeout(() => window.scrollTo({top: scrollPosRef.current, behavior: 'instant'}), 50); }} 
                                        className="group flex items-center gap-3 text-sm font-light uppercase tracking-widest hover:opacity-60 transition-opacity">
                                    <span className="w-8 h-8 rounded-full border border-black/20 flex items-center justify-center group-hover:border-black transition-colors"><ArrowLeftIcon size={16} /></span> 返回作品集列表
                                </button>
                            </div>
                        </header>
                        <main className="max-w-[90rem] mx-auto pt-0 md:pt-20 bg-[#ffffff]">
                            
                            {/* 恢复了视频逻辑判断！如果是 .mp4 则渲染视频组件 */}
                            <div className="flex flex-col gap-4 px-4 md:gap-4 md:px-6 mb-16">
                                {activeProject.gallery?.map((src, idx) => {
                                    const isVideo = typeof src === 'string' && src.toLowerCase().endsWith('.mp4');
                                    if (isVideo) {
                                        return (
                                            <ScrollReveal key={idx} delay={idx * 50}>
                                                <div className="relative w-full flex items-center justify-center bg-[#ededed]">
                                                    <video src={`${src}#t=0.001`} controls preload="metadata" playsInline className="w-full h-auto object-cover"></video>
                                                </div>
                                            </ScrollReveal>
                                        );
                                    }
                                    return (
                                        <ScrollReveal key={idx} delay={idx * 50}>
                                            <ProgressiveImage src={src} alt={`Detail ${idx + 1}`} />
                                        </ScrollReveal>
                                    );
                                })}
                            </div>

                            {/* 详情页底部：完全恢复“上一个作品”和“下一个作品” */}
                            <div className="pt-12 pb-24 md:pb-40 flex flex-row justify-center items-stretch gap-3 md:gap-6 px-4 md:px-6 max-w-5xl mx-auto">
                                {prevProject && (
                                    <button onClick={() => { 
                                        if (prevProject.externalLink) window.open(prevProject.externalLink, '_blank');
                                        else { setActiveProject(prevProject); window.scrollTo(0,0); }
                                    }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-8 md:py-20 transition-all duration-700 text-center w-full bg-transparent hover:bg-white border border-transparent hover:border-black/5 hover:-translate-y-3 hover:shadow-[0_50px_100px_rgba(0,0,0,0.06)]">
                                        <span className="text-black/50 text-sm md:text-sm tracking-widest md:tracking-[0.5em] uppercase font-light">上一个作品</span>
                                        <div className="text-xl md:text-2xl lg:text-3xl font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-8 decoration-1 flex items-center justify-center leading-tight">
                                            {prevProject.title}
                                        </div>
                                    </button>
                                )}
                                {nextProject ? (
                                    <button onClick={() => { 
                                        if (nextProject.externalLink) window.open(nextProject.externalLink, '_blank');
                                        else { setActiveProject(nextProject); window.scrollTo(0,0); }
                                    }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-8 md:py-20 transition-all duration-700 text-center w-full bg-transparent hover:bg-white border border-transparent hover:border-black/5 hover:-translate-y-3 hover:shadow-[0_50px_100px_rgba(0,0,0,0.06)]">
                                        <span className="text-black/50 text-sm md:text-sm tracking-widest md:tracking-[0.5em] uppercase font-light">下一个作品</span>
                                        <div className="text-xl md:text-2xl lg:text-3xl font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-8 decoration-1 flex items-center justify-center leading-tight">
                                            {nextProject.title}
                                        </div>
                                    </button>
                                ) : (
                                    <button onClick={() => { setActiveProject(null); setTimeout(() => window.scrollTo({top: scrollPosRef.current, behavior: 'instant'}), 50); }} 
                                            className="group flex-1 flex flex-col items-center justify-center gap-2 md:gap-6 px-2 md:px-16 py-8 md:py-20 transition-all duration-700 text-center w-full bg-transparent hover:bg-white border border-transparent hover:border-black/5 hover:-translate-y-3 hover:shadow-[0_50px_100px_rgba(0,0,0,0.06)]">
                                        <span className="text-black/50 text-sm md:text-sm tracking-widest md:tracking-[0.5em] uppercase font-light">End</span>
                                        <div className="text-xl md:text-2xl lg:text-3xl font-light tracking-tight transition-all underline md:no-underline md:group-hover:underline underline-offset-8 decoration-1 uppercase leading-tight">返回作品集列表</div>
                                    </button>
                                )}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- 首页 ---
            return (
                <div className="min-h-screen bg-[#fafafa] text-black">
                    {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 rounded-full text-sm z-[1000] fade-in shadow-2xl">{toast}</div>}
                    <nav className="fixed top-0 left-0 w-full z-[100] bg-[#fafafa]/90 backdrop-blur-md py-5 border-b border-black/[0.05]">
                        <div className="max-w-[90rem] mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="font-bold tracking-[0.2em] text-sm uppercase hidden md:block">DING HELIANG</div>
                            {/* 1. 优化：手机端头部锚点文案字号+2 (text-xs -> text-sm) */}
                            <div className="flex gap-8 text-sm md:text-sm tracking-widest mx-auto md:mx-0">
                                <button onClick={() => scrollToSection('bio')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'bio' ? 'text-black' : 'text-black/30 hover:text-black'}`}>个人简介</button>
                                <button onClick={() => scrollToSection('experience')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'experience' ? 'text-black' : 'text-black/30 hover:text-black'}`}>工作履历</button>
                                <button onClick={() => scrollToSection('projects')} className={`uppercase font-light transition-all duration-300 ${activeSection === 'projects' ? 'text-black' : 'text-black/30 hover:text-black'}`}>核心项目</button>
                            </div>
                        </div>
                    </nav>
                    
                    {/* 个人简介 */}
                    <header id="bio" className="relative min-h-[90vh] flex flex-col justify-center px-6 md:px-12 pt-32 pb-24 border-b border-black/[0.05]">
                        <div className="absolute top-0 left-0 w-full flex justify-center pt-24 md:pt-32 overflow-hidden select-none pointer-events-none z-0">
                            <span className="text-[22vw] lg:text-[23vw] font-black text-black/[0.03] tracking-tighter leading-[0.8] whitespace-nowrap uppercase">PORTFOLIO</span>
                        </div>
                        <div className="max-w-[90rem] mx-auto w-full grid lg:grid-cols-12 gap-12 items-center z-10 relative mt-12 md:mt-20">
                            <div className="lg:col-span-7 flex flex-col justify-center relative z-20 order-2 lg:order-1">
                                <ScrollReveal>
                                    <h1 className="leading-[0.85] uppercase m-0 p-0 text-black flex flex-col tracking-tighter">
                                        <span className="font-light tracking-[0.3em] text-black/30 text-xs md:text-sm mb-8 ml-1">SELECTED WORKS</span>
                                        <span className="font-black text-[22vw] lg:text-[13vw] ml-[-1vw]">{personalInfo.lastName}</span>
                                        <span className="font-thin italic text-[16vw] lg:text-[9.5vw] mt-2">{personalInfo.enName}</span>
                                        <span className="font-medium not-italic text-4xl md:text-6xl tracking-[0.2em] text-black mt-6 lg:mt-10 opacity-80 ml-1">{personalInfo.name}</span>
                                    </h1>
                                </ScrollReveal>
                                <ScrollReveal delay={200} className="mt-16 lg:mt-24 max-w-xl pl-1">
                                    <p className="text-black/30 mb-5 text-xs font-light uppercase tracking-[0.2em]">Design Philosophy</p>
                                    
                                    {/* 恢复了字号：text-xl md:text-2xl */}
                                    <p className="font-light text-xl md:text-2xl leading-relaxed text-black/80 tracking-wide">{personalInfo.motto}</p>
                                    
                                    <div className="flex flex-col gap-y-10 mt-16 pt-10 border-t border-black/[0.05]">
                                        <div>
                                            <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em]">Education</p>
                                            
                                            {/* 恢复了“/”的透明度 opacity-20 */}
                                            <p className="text-xl font-thin tracking-tight">{personalInfo.school}<span className="font-thin mx-2 opacity-20">/</span>{personalInfo.degree}<span className="font-thin mx-2 opacity-20">/</span>{personalInfo.major}</p>
                                        </div>
                                        
                                        {/* 恢复了同一行的弹性布局 flex-wrap */}
                                        <div className="flex flex-wrap gap-x-16 gap-y-6">
                                            <div onClick={() => handleCopy(personalInfo.phone.replace(/-/g, ''))} className="cursor-pointer group">
                                                <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em] group-hover:text-black transition-colors">Phone <span className="normal-case tracking-normal opacity-70 ml-1 font-thin">(Wechat)</span></p>
                                                <div className="flex items-center gap-3"><p className="text-xl font-thin tracking-tight">{personalInfo.phone}</p><span className="text-black/30 group-hover:text-black transition-colors"><CopyIcon/></span></div>
                                            </div>
                                            <div onClick={() => handleCopy(personalInfo.email)} className="cursor-pointer group">
                                                <p className="text-black/30 mb-3 text-xs font-light uppercase tracking-[0.2em] group-hover:text-black transition-colors">Email</p>
                                                <div className="flex items-center gap-3"><p className="text-xl font-thin tracking-tight lowercase">{personalInfo.email}</p><span className="text-black/30 group-hover:text-black transition-colors"><CopyIcon/></span></div>
                                            </div>
                                        </div>
                                    </div>
                                </ScrollReveal>
                            </div>
                            <div className="lg:col-span-5 relative order-1 lg:order-2 flex justify-end">
                                <ScrollReveal delay={400} className="w-full max-w-[380px] lg:max-w-[420px] aspect-[3/4] overflow-hidden bg-[#ededed] shadow-2xl">
                                    <img src={personalInfo.avatar} className="w-full h-full object-cover opacity-90 transition-transform duration-[2s] hover:scale-105" />
                                </ScrollReveal>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[90rem] mx-auto px-6 md:px-12">
                        {/* 工作履历：间距严格恢复 */}
                        <section id="experience" className="pt-24 md:pt-32">
                            <ScrollReveal>
                                {/* 锁死：mb-6 md:mb-8 */}
                                <div className="mb-6 md:mb-8 pl-1">
                                    <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4 uppercase">工作履历</h2>
                                    <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Professional Experience</p>
                                </div>
                            </ScrollReveal>
                            
                            {/* PC端：时间轴整体容器 */}
                            <div className="hidden md:block w-full py-4">
                                <div className="grid grid-cols-4 gap-0 relative">
                                    {/* 第一行：内容 (上部) */}
                                    {workExperienceData.map((exp, idx) => (
                                        <div key={`top-${idx}`} className="flex flex-col justify-end pb-1.5 px-0.5 min-h-[220px]">
                                            {idx % 2 === 0 ? (
                                                <ScrollReveal delay={idx * 100} className="w-full">
                                                    <h3 className="text-lg xl:text-xl font-bold tracking-tight mb-1">{exp.company}</h3>
                                                    <p className="text-sm font-medium text-black/50 mb-3">{exp.role}</p>
                                                    <p className="text-[12px] font-light leading-relaxed text-black/60 text-justify whitespace-pre-line">{exp.description}</p>
                                                </ScrollReveal>
                                            ) : (
                                                <ScrollReveal delay={idx * 100} className="w-full">
                                                    <p className="text-[11px] font-thin tracking-[0.1em] text-black/40 uppercase text-center pb-1.5">{exp.time}</p>
                                                </ScrollReveal>
                                            )}
                                        </div>
                                    ))}

                                    {/* 第二行：轴线 */}
                                    <div className="col-span-4 h-px bg-black/10 relative my-4 flex items-center">
                                        <div className="absolute inset-0 grid grid-cols-4 pointer-events-none">
                                            {[0, 1, 2, 3].map(i => (
                                                <div key={`dot-${i}`} className="flex justify-center relative items-center h-full">
                                                    <div className="w-2 h-2 rounded-full bg-black absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10"></div>
                                                    <div className={`absolute w-px h-5 bg-black/5 ${i % 2 === 0 ? 'bottom-1/2 mb-1.5' : 'top-1/2 mt-1.5'}`}></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 第三行：内容 (下部) */}
                                    {workExperienceData.map((exp, idx) => (
                                        <div key={`bottom-${idx}`} className="flex flex-col justify-start pt-1.5 px-0.5 min-h-[220px]">
                                            {idx % 2 !== 0 ? (
                                                <ScrollReveal delay={idx * 100} className="w-full">
                                                    <h3 className="text-lg xl:text-xl font-bold tracking-tight mb-1">{exp.company}</h3>
                                                    <p className="text-sm font-medium text-black/50 mb-3">{exp.role}</p>
                                                    <p className="text-[12px] font-light leading-relaxed text-black/60 text-justify whitespace-pre-line">{exp.description}</p>
                                                </ScrollReveal>
                                            ) : (
                                                <ScrollReveal delay={idx * 100} className="w-full">
                                                    <p className="text-[11px] font-thin tracking-[0.1em] text-black/40 uppercase text-center pt-1.5">{exp.time}</p>
                                                </ScrollReveal>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                {/* 底部留白紧凑对齐：h-12 md:h-16 */}
                                <div className="h-12 md:h-16"></div>
                            </div>
                            
                            {/* 移动端履历结构完全重构 */}
                            {/* 2. 优化：增加 mb-16 下边距，让时间轴竖线不要与下方的横向分割线连在一起 */}
                            <div className="block md:hidden relative ml-2 mt-8 mb-16">
                                {/* 3. 优化：竖直线，独立抽离出来，顶部从第一个圆点中心(top-[10px])开始，底部到底侧文字(bottom-0)停止 */}
                                <div className="absolute w-px bg-black/10 left-0 top-[10px] bottom-0 z-0"></div>
                                
                                {workExperienceData.map((exp, idx) => (
                                    <ScrollReveal key={idx} delay={idx * 100} className="relative pl-6 mb-12 last:mb-0 group z-10">
                                        {/* 圆点对齐优化，精确对齐首行文本中心 */}
                                        <div className="absolute w-3 h-3 bg-black rounded-full -left-[5.5px] top-1"></div>
                                        {/* 1. 优化：手机端时间字号 +2 (text-[11px] -> text-[13px]) */}
                                        <p className="text-[13px] font-thin tracking-[0.1em] text-black/60 uppercase mb-2">{exp.time}</p>
                                        {/* 2. 优化：三个字段下间距保持一致统一用 mb-2 */}
                                        <h3 className="text-lg font-bold tracking-tight mb-2">{exp.company}</h3>
                                        <p className="text-sm font-medium text-black/50 mb-2">{exp.role}</p>
                                        <p className="text-sm font-light leading-relaxed text-black/60 whitespace-pre-line">{exp.description}</p>
                                    </ScrollReveal>
                                ))}
                            </div>
                        </section>

                        {/* 核心项目展示 */}
                        <section id="projects" className="pt-24 md:pt-32 border-t border-black/[0.05]">
                            <ScrollReveal>
                                <div className="mb-12 md:mb-16 pl-1">
                                    <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4 uppercase">核心项目展示</h2>
                                    <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Selected Core Projects</p>
                                </div>
                            </ScrollReveal>
                            
                            <div className="mb-12">
                                {corePortfolioData.map(renderProjectGroup)}
                            </div>

                            {/* 团队管理 */}
                            <div className="pt-24 md:pt-32 border-t border-black/[0.05]">
                                <ScrollReveal>
                                    <div className="mb-12 md:mb-16 pl-1">
                                        <h2 className="text-4xl md:text-6xl font-black tracking-tighter text-black mb-4 uppercase">团队管理</h2>
                                        <p className="text-black/30 text-xs md:text-sm font-light uppercase tracking-[0.3em]">Team Management & Leadership</p>
                                    </div>
                                </ScrollReveal>
                                <div className="mb-12">
                                    {managementData.map(renderProjectGroup)}
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="bg-black text-white py-24 mt-8 border-t border-white/5">
                        <div className="max-w-[90rem] mx-auto px-6 md:px-12 flex flex-col lg:flex-row justify-between items-start gap-16">
                            <ScrollReveal>
                                <h2 className="text-6xl md:text-8xl tracking-tighter mb-16 leading-[0.9]"><span className="font-thin">LET'S CREATE</span><br/><span className="font-black text-white/40">SOMETHING</span><br/><span className="font-thin">TOGETHER.</span></h2>
                                <div className="flex flex-wrap gap-10">
                                    <div className="flex items-center gap-4 text-sm md:text-base font-light tracking-widest hover:text-white/60 transition-colors cursor-pointer" onClick={() => handleCopy(personalInfo.email)}><span className="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center"><MailIcon /></span>{personalInfo.email}</div>
                                    <div className="flex items-center gap-4 text-sm md:text-base font-light tracking-widest hover:text-white/60 transition-colors cursor-pointer" onClick={() => handleCopy(personalInfo.phone.replace(/-/g, ''))}><span className="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center"><PhoneIcon /></span><span>{personalInfo.phone} <span className="text-white/40 text-xs md:text-sm ml-1 font-thin">(Wechat)</span></span></div>
                                </div>
                            </ScrollReveal>
                            <div className="flex flex-col lg:items-end text-white/40 text-sm font-light uppercase tracking-[0.2em] mt-12"><p>Based in China</p><p className="mt-12 text-xs opacity-30 font-sans tracking-normal">© {new Date().getFullYear()} Heliang Ding.</p></div>
                        </div>
                    </footer>
                </div>
            );
        }
        
        // 彻底解决之前“无法刷新/一直转圈”的罪魁祸首：
        // 不再等待 DOMContentLoaded 事件（因为该事件已经过去了），而是直接渲染！
        const startApp = () => {
            const rootElement = document.getElementById('root');
            if (window.ReactDOM && rootElement) {
                const root = window.ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        };
        startApp(); // 脚本被 Babel 编译并注入时，立即执行渲染。
    </script>
</body>
</html>
